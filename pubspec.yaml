name: notova
description: "Tu app de productividad gamificada"
publish_to: "none"
version: 0.2.0+2

environment:
  sdk: ^3.11.1

dependencies:
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  firebase_storage: ^13.1.0
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  google_sign_in: ^7.1.0
  image_picker: ^1.1.2
  crop: ^0.5.5
  googleapis: ^13.2.0
  http: ^1.2.2
  provider: ^6.1.5+1
  audioplayers: ^6.0.0
  path_provider: ^2.1.0
  csv: ^6.0.0
  share_plus: ^13.0.0
  shared_preferences: ^2.5.5
  drift: ^2.27.0
  sqlcipher_flutter_libs: ^0.7.0
  flutter_secure_storage: ^8.1.0
  path: ^1.9.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  tutorial_coach_mark: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  drift_dev: ^2.27.0
  build_runner: ^2.4.15
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logoapp_preview.png"
  adaptive_icon_background: "#120E1A"
  adaptive_icon_foreground: "assets/images/logoapp_preview.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
